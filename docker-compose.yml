services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transitops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transitops}
      POSTGRES_DB: ${POSTGRES_DB:-transitops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transitops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
      - "5173:5173"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transitops}:${POSTGRES_PASSWORD:-transitops}@db:5432/${POSTGRES_DB:-transitops}
      JWT_SECRET: ${JWT_SECRET:-devsecret}
      NODE_ENV: development
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - backend_node_modules:/app/backend/node_modules
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
